spring.application.name=microcrm

# Configuration de base de données par défaut (PostgreSQL)
# Surchargée en production/conteneur par les variables d'environnement :
# SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
spring.datasource.url=jdbc:postgresql://localhost:5432/microcrm
spring.datasource.username=crm_admin
spring.datasource.password=crm_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuration JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
