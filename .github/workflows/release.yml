name: Release (CD & Packaging)

on:
  push:
    tags:
      - 'front-*'
      - 'back-*'

permissions:
  contents: write
  packages: write

jobs:
  release-frontend:
    name: Build & Release Frontend
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/front-')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Parse Version Tag
        id: version
        run: |
          TAG_NAME=${{ github.ref_name }}
          VERSION_NUM=${TAG_NAME#front-}
          echo "version=${VERSION_NUM}" >> $GITHUB_OUTPUT
          
          IMAGE_BASE="ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')-front"
          echo "image_name=${IMAGE_BASE}" >> $GITHUB_OUTPUT

      - name: Build Frontend Production Image
        run: |
          docker build --target front \
            -t "${{ steps.version.outputs.image_name }}:${{ steps.version.outputs.version }}" \
            -t "${{ steps.version.outputs.image_name }}:latest" \
            .

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Frontend Image to GHCR
        run: |
          docker push "${{ steps.version.outputs.image_name }}:${{ steps.version.outputs.version }}"
          docker push "${{ steps.version.outputs.image_name }}:latest"

      # Compilation locale pour attacher l'artefact statique compilé à la release GitHub
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'

      - name: Build static Angular zip
        run: |
          cd front
          npm ci
          npx @angular/cli build --optimization
          cd dist/microcrm/browser
          zip -r ../../../../microcrm-frontend-${{ steps.version.outputs.version }}.zip .

      - name: Create GitHub Release (Frontend)
        uses: softprops/action-gh-release@v2
        with:
          name: Release Frontend ${{ steps.version.outputs.version }}
          files: microcrm-frontend-${{ steps.version.outputs.version }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-backend:
    name: Build & Release Backend
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/back-')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Parse Version Tag
        id: version
        run: |
          TAG_NAME=${{ github.ref_name }}
          VERSION_NUM=${TAG_NAME#back-}
          echo "version=${VERSION_NUM}" >> $GITHUB_OUTPUT
          
          IMAGE_BASE="ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')-back"
          echo "image_name=${IMAGE_BASE}" >> $GITHUB_OUTPUT

      - name: Build Backend Production Image
        run: |
          docker build --target back \
            -t "${{ steps.version.outputs.image_name }}:${{ steps.version.outputs.version }}" \
            -t "${{ steps.version.outputs.image_name }}:latest" \
            .

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Backend Image to GHCR
        run: |
          docker push "${{ steps.version.outputs.image_name }}:${{ steps.version.outputs.version }}"
          docker push "${{ steps.version.outputs.image_name }}:latest"

      # Compilation locale pour attacher le JAR compilé à la release GitHub
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Spring Boot JAR
        run: |
          cd back
          ./gradlew bootJar
          cp build/libs/microcrm-0.0.1-SNAPSHOT.jar ../microcrm-backend-${{ steps.version.outputs.version }}.jar

      - name: Create GitHub Release (Backend)
        uses: softprops/action-gh-release@v2
        with:
          name: Release Backend ${{ steps.version.outputs.version }}
          files: microcrm-backend-${{ steps.version.outputs.version }}.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
