version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: microcrm-db
    environment:
      POSTGRES_DB: microcrm
      POSTGRES_USER: crm_admin
      POSTGRES_PASSWORD: crm_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_admin -d microcrm"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - microcrm-network
    restart: unless-stopped

  backend:
    build:
      context: .
      target: back
    image: orion-microcrm-back:latest
    container_name: microcrm-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/microcrm
      SPRING_DATASOURCE_USERNAME: crm_admin
      SPRING_DATASOURCE_PASSWORD: crm_pass
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - microcrm-network
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:12201"
        tag: "microcrm-backend"
    restart: unless-stopped

  frontend:
    build:
      context: .
      target: front
    image: orion-microcrm-front:latest
    container_name: microcrm-frontend
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - microcrm-network
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:12201"
        tag: "microcrm-frontend"
    restart: unless-stopped

networks:
  microcrm-network:
    name: microcrm-network

volumes:
  postgres_data:
